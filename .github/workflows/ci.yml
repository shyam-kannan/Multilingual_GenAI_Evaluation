name: CI — Eval Gateway

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest run

  prompt-regression:
    runs-on: ubuntu-latest
    needs: [backend-tests]
    if: github.event_name == 'pull_request'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: eval_gateway
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/eval_gateway
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Run prompt regression check
        run: |
          python -c "
          import requests, sys, json

          # Start the server in the background
          import subprocess, time
          proc = subprocess.Popen(['uvicorn', 'app.main:app', '--host', '0.0.0.0', '--port', '8000'])
          time.sleep(3)

          try:
              # Health check
              r = requests.get('http://localhost:8000/health')
              assert r.status_code == 200, f'Health check failed: {r.status_code}'

              # If prompts exist with golden sets, run CI check
              prompts = requests.get('http://localhost:8000/api/prompts').json()
              for prompt in prompts:
                  r = requests.post(
                      'http://localhost:8000/api/ci/check',
                      json={'prompt_name': prompt['name']}
                  )
                  result = r.json()
                  print(json.dumps(result, indent=2))
                  if result.get('status') == 'failed':
                      print(f'REGRESSION DETECTED for {prompt[\"name\"]}')
                      sys.exit(1)
          finally:
              proc.terminate()

          print('All prompt regression checks passed')
          "
